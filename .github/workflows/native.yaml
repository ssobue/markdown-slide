# https://github.com/marketplace/actions/github-action-for-graalvm
name: GraalVM CI

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@bef4b0e916c7dd079bf60fb95d49139f67e32c5f # v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
      - name: Build with Maven
        run: mvn -Pnative native:compile
      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: markdown-slide-ubuntu
          path: ./target/markdown-slide
