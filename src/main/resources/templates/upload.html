<!DOCTYPE html>
<html lang="ja" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <!--/*@thymesVar id="title" type="java.lang.String"*/-->
  <title th:text="${title}">Title</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css"
        integrity="sha512-UJfAaOlIRtdR+0P6C3KUoTDAxVTuy3lnSXLyLKlHYJlcSU8Juge/mjeaxDNMlw9LgeIotgz5FP8eUQPhX1q10A=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"
          integrity="sha512-NiWqa2rceHnN3Z5j6mSAvbwwg3tiwVNxiAQaaSMSXnRRDh5C2mk/+sKQRw8qjV1vN4nf8iK2a0b048PnHbyx+Q=="
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>

<body>
<div class="container">
  <h1>Upload File</h1>
  <form enctype="multipart/form-data" th:action="@{/upload}" method="post">
    <div class="form-group">
      <label for="fileNameInput">FileName</label>
      <input id="fileNameInput" type="text" name="fileName"/>
    </div>
    <div class="form-group">
      <label for="fileInput">FilePath</label>
      <input id="fileInput" type="file" name="file"/>
    </div>

    <button class="btn waves-effect waves-light" type="submit" name="action">アップロード</button>
  </form>
</div>
</body>
</html>
